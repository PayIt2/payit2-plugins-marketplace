name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout marketplace repo
        uses: actions/checkout@v4

      - name: Checkout campaign-coach source repo
        uses: actions/checkout@v4
        with:
          repository: PayIt2/payit2-campaign-coach
          path: ../payit2-campaign-coach
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build plugin and skill zips
        run: bash scripts/build-zips.sh

      - name: Upload zips to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            dist/payit2-plugins-marketplace.zip \
            dist/payit2-campaign-coach-plugin.zip --clobber

          for zip in dist/skills/*.zip; do
            gh release upload "$GITHUB_REF_NAME" "$zip" --clobber
          done
