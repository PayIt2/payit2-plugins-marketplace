name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build plugin and skill zips
        run: bash scripts/build-zips.sh

      - name: Upload zips to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Attach marketplace zip and full plugin zip
          gh release upload "$GITHUB_REF_NAME" \
            dist/payit2-plugins-marketplace.zip \
            dist/payit2-campaign-coach-plugin.zip --clobber

          # Attach individual skill zips
          for zip in dist/skills/*.zip; do
            gh release upload "$GITHUB_REF_NAME" "$zip" --clobber
          done
