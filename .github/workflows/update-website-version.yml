name: Update Website Version Badge

on:
  release:
    types: [published]

jobs:
  update-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: PayIt2/payit2-website
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Extract version from release tag
        id: version
        run: |
          # Strip leading 'v' from tag (v1.4.0 -> 1.4.0)
          TAG="${GITHUB_REF_NAME#v}"
          # Short version for badge display (1.4.0 -> 1.4)
          SHORT=$(echo "$TAG" | sed 's/\.[0-9]*$//')
          echo "full=$TAG" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Update version badge in plugins.html
        run: |
          sed -i "s/Claude Plugin v[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?/Claude Plugin v${{ steps.version.outputs.short }}/" plugins.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          BRANCH="auto/plugin-v${{ steps.version.outputs.full }}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.html
          git commit -m "Update plugin version badge to v${{ steps.version.outputs.short }}"
          git push origin "$BRANCH"
          gh pr create \
            --repo PayIt2/payit2-website \
            --title "Update plugin badge to v${{ steps.version.outputs.short }}" \
            --body "$(cat <<'EOF'
Automated update from marketplace release ${{ github.ref_name }}.

Updates the plugin version badge on the plugins page.

Source: PayIt2/payit2-plugins-marketplace@${{ github.ref_name }}
EOF
          )"
