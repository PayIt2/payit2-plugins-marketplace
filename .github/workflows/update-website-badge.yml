name: Update Website Version Badge

on:
  release:
    types: [published]
  # Manual trigger for testing or re-running against an existing release
  # without cutting a new tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to use for the badge update (e.g. v1.5.0)"
        required: true
        type: string

jobs:
  update-website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v5
        with:
          repository: PayIt2/payit2-website
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - name: Extract version from release tag
        id: version
        run: |
          # Prefer the dispatch input, fall back to GITHUB_REF_NAME for release events.
          RAW="${{ inputs.tag }}"
          if [ -z "$RAW" ]; then
            RAW="$GITHUB_REF_NAME"
          fi
          # Strip leading 'v' from tag (v1.4.0 -> 1.4.0)
          TAG="${RAW#v}"
          # Short version for badge display (1.4.0 -> 1.4)
          SHORT=$(echo "$TAG" | sed 's/\.[0-9]*$//')
          echo "full=$TAG" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Update version badge in plugins.html
        run: |
          sed -i "s/Claude Plugin v[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?/Claude Plugin v${{ steps.version.outputs.short }}/" plugins.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          BRANCH="auto/plugin-v${{ steps.version.outputs.full }}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.html
          git commit -m "Update plugin version badge to v${{ steps.version.outputs.short }}"
          git push origin "$BRANCH"
          TAG="${{ github.ref_name }}"
          BODY=$(printf 'Automated update from marketplace release %s.\n\nUpdates the plugin version badge on the plugins page.\n\nSource: PayIt2/payit2-plugins-marketplace@%s\n' "$TAG" "$TAG")
          gh pr create \
            --repo PayIt2/payit2-website \
            --title "Update plugin badge to v${{ steps.version.outputs.short }}" \
            --body "$BODY"
